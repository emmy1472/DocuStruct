version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: docustruct_db
    restart: always
    environment:
      POSTGRES_DB: docustruct
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: docustruct_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: docustruct_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  qdrant_data:
